<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 2</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="style.css">
    
</head>
<body>

    <div class="container d-flex justify-content-center align-items-center">
        <div>
            
            <div class="mb-3 text-center">
                <h1><strong>Heat Index Checker</strong></h1><br>
                <h5>NOTE:</h5>
                <p>Input the temperature and humidity, then click Check to see the heat index and its status.</p>
            </div>

                <div class="mb-3">
                    <label class="form-label">Temperature (°C)</label>
                    <input type="number" id="temp" class="form-control" placeholder="Enter Degree value">
                </div>

                <div class="mb-3">
                    <label class="form-label">Humidity (%)</label>
                    <input type="number" id="hum" class="form-control" placeholder="Enter percentage value">
                </div><br>

                <div>
                    <button class="btn btn-success" onclick="checkHeat()">Check</button><br><br>

                    <button class="btn btn-danger" onclick="window.location.reload()">Reset</button>
                </div>
                
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
